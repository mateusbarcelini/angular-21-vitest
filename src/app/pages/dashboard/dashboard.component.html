<div class="dashboard-container">
    <h1 class="title">Dashboard</h1>

    <!-- Cards Section -->
    <div class="cards">
        <div class="card" *ngFor="let card of stats">
            <div class="card-content">
                <h3>{{ card.title }}</h3>
                <p class="value">{{ card.value }}</p>
                <span class="trend" [ngClass]="card.trend">
                    {{ card.change }}
                </span>
            </div>
        </div>
    </div>

    <!-- Table Section -->
    <div class="table-container">
        <h2>Recent Activities</h2>

        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Action</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody>
                <tr *ngFor="let item of tableData">
                    <td>{{ item.user }}</td>
                    <td>{{ item.action }}</td>
                    <td>
                        <span
                            class="status"
                            [ngClass]="item.status.toLowerCase()"
                        >
                            {{ item.status }}
                        </span>
                    </td>
                    <td>{{ item.date }}</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
